<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documentation</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

.sidebar {
  width: 260px;
  background: #111827;
  color: white;
  padding: 20px;
  overflow-y: auto;
}

.sidebar h2 {
  margin-top: 0;
  font-size: 18px;
  border-bottom: 1px solid #374151;
  padding-bottom: 10px;
}

.nav-item {
  cursor: pointer;
  padding: 8px 0;
  color: #d1d5db;
}

.nav-item:hover {
  color: white;
}

.content {
  flex: 1;
  padding: 40px;
  overflow-y: auto;
}

.content h1 {
  margin-top: 0;
}

.error {
  color: red;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2 id="site-title">Loading...</h2>
  <div id="nav"></div>
</div>

<div class="content">
  <div id="doc-content">Loading documentation...</div>
</div>

<script>
fetch("content.json")
  .then(res => {
    if (!res.ok) throw new Error("Missing required content.json file.");
    return res.json();
  })
  .then(data => {
    if (!data.title || !data.sections) {
      throw new Error("Invalid content.json structure.");
    }

    document.getElementById("site-title").textContent = data.title;

    const nav = document.getElementById("nav");
    const content = document.getElementById("doc-content");

    function loadSection(section) {
      content.innerHTML = `
        <h1>${section.heading}</h1>
        <p>${section.content}</p>
      `;
    }

    data.sections.forEach((section, index) => {
      const div = document.createElement("div");
      div.className = "nav-item";
      div.textContent = section.heading;
      div.onclick = () => loadSection(section);
      nav.appendChild(div);

      if (index === 0) loadSection(section);
    });
  })
  .catch(err => {
    document.body.innerHTML = `
      <div style="padding:40px">
        <h1 class="error">Error</h1>
        <p>${err.message}</p>
        <p>This documentation site requires a valid <strong>content.json</strong> file.</p>
      </div>
    `;
  });
</script>

</body>
</html>
